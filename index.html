<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Details Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <main class="page-shell">
    <section class="hero-card">
      <div>
        <p class="eyebrow">Simple Database Application</p>
        <h1>User Details Manager</h1>
        <p class="hero-text">Add, view, search, edit, and delete user records from a SQLite database using a clean frontend form.</p>
      </div>
      <div class="stats-box">
        <span id="userCount">0</span>
        <small>Total Users</small>
      </div>
    </section>

    <section class="grid-layout">
      <section class="panel form-panel">
        <div class="panel-header">
          <h2 id="formTitle">Add User</h2>
          <button id="resetBtn" class="ghost-btn" type="button">Clear</button>
        </div>

        <form id="userForm" autocomplete="off">
          <input type="hidden" id="userId" />

          <label>
            Full Name <span>*</span>
            <input id="fullName" type="text" placeholder="Example: Aditi Sharma" required />
          </label>

          <label>
            Email <span>*</span>
            <input id="email" type="email" placeholder="aditi@example.com" required />
          </label>

          <label>
            Phone <span>*</span>
            <input id="phone" type="tel" placeholder="+91 98765 43210" required />
          </label>

          <label>
            Role <span>*</span>
            <select id="role" required>
              <option value="">Select role</option>
              <option>Admin</option>
              <option>Developer</option>
              <option>Tester</option>
              <option>Data Analyst</option>
              <option>Manager</option>
              <option>Guest</option>
            </select>
          </label>

          <label>
            Address
            <textarea id="address" rows="3" placeholder="City, State, Country"></textarea>
          </label>

          <label>
            Notes
            <textarea id="notes" rows="3" placeholder="Any additional information"></textarea>
          </label>

          <button class="primary-btn" type="submit" id="submitBtn">Save User</button>
          <p id="message" class="message"></p>
        </form>
      </section>

      <section class="panel list-panel">
        <div class="panel-header list-header">
          <div>
            <h2>Stored Users</h2>
            <p>Records are loaded directly from the database.</p>
          </div>
          <input id="searchInput" class="search-input" type="search" placeholder="Search users..." />
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="5" class="empty-state">No users found.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
